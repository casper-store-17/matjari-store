<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>متجري</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box;} body{margin:0;background:#F2F6FC;color:#0E1B33;}
body,button,input,textarea{font-family:'Tajawal',system-ui,'Segoe UI',Tahoma,sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}
@keyframes scaleIn{from{opacity:0;transform:scale(.82);}to{opacity:1;transform:scale(1);}}
@keyframes slideUp{from{transform:translateY(120%);}to{transform:translateY(0);}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.14);}100%{transform:scale(1);}}
.reveal{opacity:0;}.reveal.in{animation:fadeUp .7s cubic-bezier(.2,.7,.2,1) forwards;}
.btn{transition:transform .2s cubic-bezier(.2,.7,.2,1),box-shadow .2s,background .2s;cursor:pointer;}
.btn:hover{transform:translateY(-2px);}.btn:active{transform:translateY(0) scale(.985);}
.card{transition:transform .3s cubic-bezier(.2,.7,.2,1),box-shadow .3s;cursor:pointer;}
.card:hover{transform:translateY(-5px);box-shadow:0 18px 44px rgba(37,99,235,.16);}
.zoom{overflow:hidden;}.zoom img{transition:transform .7s cubic-bezier(.2,.7,.2,1);display:block;}
.card:hover .zoom img{transform:scale(1.07);}
.thumb{transition:border-color .2s,transform .2s;}.thumb:hover{transform:translateY(-2px);}
.mainimg{transition:opacity .3s ease;}
.glass{backdrop-filter:saturate(1.4) blur(10px);background:rgba(255,255,255,.85);}
.fld{width:100%;padding:14px 15px;border-radius:13px;border:1.5px solid #E1E8F3;font-size:15px;outline:none;background:#fff;transition:border-color .2s,box-shadow .2s;}
.fld:focus{border-color:#2563EB;box-shadow:0 0 0 4px rgba(37,99,235,.14);}
.fld.err{border-color:#E23D3D;}
.lab{display:block;font-weight:700;font-size:13.5px;margin-bottom:7px;color:#33415C;}
.errmsg{color:#E23D3D;font-size:13px;margin:6px 0 0;}
.cityopt{display:block;width:100%;text-align:right;background:none;border:none;padding:11px 12px;cursor:pointer;font-size:15px;border-radius:9px;transition:background .15s;}
.cityopt:hover{background:#E8F0FE;}
.shine{position:relative;overflow:hidden;}
.shine::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s;}
.shine:hover::after{left:130%;}
.mobilebar{animation:slideUp .4s cubic-bezier(.2,.7,.2,1);}
.wrap{max-width:1140px;margin:0 auto;padding:0 18px;}
@media(min-width:880px){.lg2{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:start;}.sticky-lg{position:sticky;top:86px;}.hide-lg{display:none!important;}}
@media(max-width:879px){.only-lg{display:none!important;}}
</style>
</head>
<body>
<div id="app" style="min-height:100vh"></div>

<script>
"use strict";
/* ===================== CONFIG ===================== */
var CFG = window.STORE_CONFIG || {};
var BRAND = CFG.BRAND || "متجري";
var CONFIGURED = CFG.SUPABASE_URL && CFG.SUPABASE_URL.indexOf("http")===0 && CFG.SUPABASE_URL.indexOf("PUT_YOUR")<0 && CFG.SUPABASE_KEY && CFG.SUPABASE_KEY.indexOf("PUT_YOUR")<0;
var sb = null;
if (CONFIGURED && window.supabase) { try { sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY); } catch(e){ console.error(e); } }

var CITIES = ["الدار البيضاء","الرباط","فاس","مراكش","طنجة","مكناس","أكادير","وجدة","القنيطرة","تطوان","سلا","المحمدية","الجديدة","بني ملال","الناظور","تازة","سطات","خريبكة","العرائش","برشيد","خنيفرة","الرشيدية","ورزازات","الصويرة","آسفي","تمارة","تارودانت","الحسيمة","شفشاون","العيون","الداخلة","تيزنيت","القصر الكبير","سيدي سليمان","سيدي قاسم","بركان","وزان","صفرو","زاكورة","مرتيل","الفنيدق","المضيق","بوزنيقة","أصيلة"];

function money(n){ return (Number(n||0)).toLocaleString("fr-MA")+" د.م."; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
function el(id){ return document.getElementById(id); }
function arr(x){ return Array.isArray(x)?x:[]; }

function norm(p){ return {
  id:p.id, name:p.name||"", tagline:p.tagline||"", price:Number(p.price)||0, oldPrice:Number(p.old_price)||0,
  description:p.description||"", images:arr(p.images), long_images:arr(p.long_images), benefits:arr(p.benefits),
  rating:Number(p.rating)||5, reviews:Number(p.reviews)||0, sold:Number(p.sold)||0 }; }

/* ===================== STATE ===================== */
var STATE = { products:[], product:null, main:0, qty:1, city:"", errors:{} };

/* ===================== DATA ===================== */
function loadProducts(cb){
  sb.from("products").select("*").order("created_at",{ascending:false}).then(function(res){
    if(res.error){ console.error(res.error); cb([]); return; }
    cb((res.data||[]).map(norm));
  });
}
function insertOrder(o, cb, err){
  sb.from("orders").insert(o).then(function(res){ if(res.error){ err(res.error); } else { cb(); } });
}

/* ===================== REVEAL ===================== */
function applyReveals(){
  var els = document.querySelectorAll(".reveal:not(.in)");
  if(!("IntersectionObserver" in window)){ els.forEach(function(e){e.classList.add("in");}); return; }
  var ob = new IntersectionObserver(function(list){ list.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("in"); ob.unobserve(en.target);} }); },{threshold:.12});
  els.forEach(function(e){ ob.observe(e); });
}

/* ===================== HEADER / FOOTER ===================== */
function headerHTML(){
  return '<header class="glass" style="position:sticky;top:0;z-index:40;border-bottom:1px solid #EDF1F8">'+
    '<div class="wrap" style="display:flex;align-items:center;justify-content:space-between;padding-top:13px;padding-bottom:13px">'+
      '<button class="btn" onclick="App.home()" style="border:none;background:none;display:flex;align-items:center;gap:9px">'+
        '<span style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;box-shadow:0 4px 12px rgba(37,99,235,.35)">'+esc(BRAND.slice(0,1))+'</span>'+
        '<span style="font-size:21px;font-weight:800">'+esc(BRAND)+'</span>'+
      '</button>'+
      '<div class="only-lg" style="display:flex;gap:16px;font-size:12.5px;color:#78859E;font-weight:500">'+
        '<span>🚚 توصيل لكل المغرب</span><span style="color:#0EA5A0;font-weight:700">💳 الدفع عند الاستلام</span></div>'+
    '</div></header>';
}
function footerHTML(){ return '<footer style="border-top:1px solid #EDF1F8;margin-top:56px;padding:28px 18px;text-align:center;color:#78859E;font-size:13px">'+esc(BRAND)+' © 2026 — صُنع بعناية في المغرب</footer>'; }

/* ===================== VIEWS ===================== */
function starsHTML(rating,reviews,small){
  var full=Math.round(rating); var s="";
  for(var i=0;i<5;i++){ s+= i<full ? '<span style="color:#E3A008">★</span>' : '<span style="color:#D8DEEA">★</span>'; }
  return '<span style="display:inline-flex;align-items:center;gap:7px;font-size:'+(small?14:17)+'px;letter-spacing:1px">'+s+
    '<span style="color:#78859E;font-size:'+(small?12:13.5)+'px">'+rating+' · '+reviews+' تقييم</span></span>';
}

function renderHome(){
  var h = headerHTML() + '<div class="wrap" style="padding-top:34px;padding-bottom:20px">'+
    '<div class="reveal"><p style="color:#2563EB;font-weight:800;letter-spacing:1px;font-size:13px;margin:0">تشكيلتنا</p>'+
    '<h1 style="font-size:34px;font-weight:900;margin:6px 0 4px">منتجات مختارة بعناية</h1>'+
    '<p style="color:#78859E;margin:0 0 26px;font-size:16px">اطلب بكل سهولة — الدفع عند الاستلام في كل المغرب</p></div>';

  if(STATE.products.length===0){
    h += '<div style="background:#fff;border:1.5px dashed #E1E8F3;border-radius:20px;padding:50px;text-align:center;color:#78859E">لا توجد منتجات حالياً.</div>';
  } else {
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px">';
    STATE.products.forEach(function(p){
      var off = p.oldPrice>p.price ? Math.round((1-p.price/p.oldPrice)*100) : 0;
      h += '<div class="card reveal" onclick="App.open(\''+p.id+'\')" style="background:#fff;border:1px solid #E1E8F3;border-radius:20px;overflow:hidden">'+
        '<div class="zoom" style="position:relative">'+
          (p.images[0]?'<img src="'+esc(p.images[0])+'" style="width:100%;height:240px;object-fit:cover">':'<div style="height:240px;background:#EDF1F8"></div>')+
          (off>0?'<span style="position:absolute;top:12px;right:12px;background:#0E1B33;color:#fff;font-weight:800;font-size:12px;padding:5px 11px;border-radius:30px">-'+off+'%</span>':'')+
        '</div>'+
        '<div style="padding:16px">'+
          '<h3 style="font-weight:800;font-size:17px;margin:0 0 5px">'+esc(p.name)+'</h3>'+
          starsHTML(p.rating,p.reviews,true)+
          '<div style="display:flex;align-items:baseline;gap:8px;margin-top:10px">'+
            '<span style="font-weight:900;font-size:20px">'+money(p.price)+'</span>'+
            (off>0?'<span style="color:#78859E;text-decoration:line-through;font-size:13px">'+money(p.oldPrice)+'</span>':'')+
          '</div>'+
          '<button class="btn shine" style="margin-top:13px;width:100%;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:12px;padding:12px;font-weight:800;font-size:15px;box-shadow:0 8px 18px rgba(37,99,235,.28)">اطلب الآن</button>'+
        '</div></div>';
    });
    h += '</div>';
  }
  h += '</div>' + footerHTML();
  el("app").innerHTML = h;
  applyReveals();
}

function renderLanding(){
  var p = STATE.product; if(!p){ renderHome(); return; }
  var off = p.oldPrice>p.price ? Math.round((1-p.price/p.oldPrice)*100) : 0;
  var total = p.price*STATE.qty;
  var e = STATE.errors;

  var thumbs="";
  if(p.images.length>1){ thumbs='<div style="display:flex;gap:11px;margin-top:13px;flex-wrap:wrap">';
    p.images.forEach(function(s,i){ thumbs+='<img class="thumb" onclick="App.setMain('+i+')" src="'+esc(s)+'" style="width:80px;height:80px;object-fit:cover;border-radius:14px;cursor:pointer;border:'+(i===STATE.main?'2.5px solid #2563EB':'1.5px solid #E1E8F3')+'">'; });
    thumbs+='</div>'; }

  var benefits="";
  if(p.benefits.length){ benefits='<ul class="reveal" style="list-style:none;padding:0;margin:0 0 22px;display:grid;gap:11px">';
    p.benefits.forEach(function(b){ benefits+='<li style="display:flex;align-items:flex-start;gap:11px;font-size:15.5px"><span style="width:22px;height:22px;border-radius:50%;background:#E8F0FE;color:#2563EB;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;margin-top:1px">✓</span><span style="color:#33415C">'+esc(b)+'</span></li>'; });
    benefits+='</ul>'; }

  var cityDD="";
  var q=STATE.city.trim();
  var matches = (q? CITIES.filter(function(c){return c.indexOf(q)>=0;}) : CITIES).slice(0,10);

  var h = headerHTML() + '<div class="wrap" style="padding-top:16px;padding-bottom:90px">'+
    '<button class="btn" onclick="App.home()" style="background:none;border:none;color:#78859E;font-size:14px;margin-bottom:14px;font-weight:600">‹ رجوع للمنتجات</button>'+
    '<div class="lg2">'+
      /* gallery */
      '<div class="sticky-lg">'+
        '<div class="zoom reveal" style="border-radius:22px;position:relative;border:1px solid #E1E8F3">'+
          (p.images[STATE.main]?'<img id="mainimg" class="mainimg" src="'+esc(p.images[STATE.main])+'" style="width:100%;height:470px;object-fit:cover">':'<div style="height:470px;background:#EDF1F8"></div>')+
          (off>0?'<span style="position:absolute;top:16px;right:16px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;font-weight:800;font-size:14px;padding:7px 14px;border-radius:30px;box-shadow:0 6px 16px rgba(37,99,235,.4)">خصم '+off+'%</span>':'')+
        '</div>'+ thumbs +
      '</div>'+
      /* details */
      '<div>'+
        '<div class="reveal">'+
          (p.sold>0?'<span style="display:inline-block;background:#E6F7F5;color:#0EA5A0;font-weight:800;font-size:12.5px;padding:5px 12px;border-radius:30px;margin-bottom:12px">🔥 تم بيع '+p.sold+'+ قطعة</span>':'')+
          '<h1 style="font-size:30px;font-weight:900;margin:0 0 6px;line-height:1.25">'+esc(p.name)+'</h1>'+
          (p.tagline?'<p style="color:#78859E;font-size:16px;margin:0 0 12px">'+esc(p.tagline)+'</p>':'')+
          starsHTML(p.rating,p.reviews,false)+
        '</div>'+
        '<div class="reveal" style="display:flex;align-items:baseline;gap:12px;margin:18px 0">'+
          '<span style="font-size:36px;font-weight:900">'+money(p.price)+'</span>'+
          (off>0?'<span style="color:#78859E;text-decoration:line-through;font-size:18px">'+money(p.oldPrice)+'</span><span style="background:#E8F0FE;color:#1D4ED8;font-weight:800;font-size:13px;padding:4px 11px;border-radius:9px">وفّر '+off+'%</span>':'')+
        '</div>'+
        benefits +
        '<div class="reveal" style="display:flex;align-items:center;gap:14px;margin-bottom:16px">'+
          '<span style="font-weight:700;color:#33415C">الكمية</span>'+
          '<div style="display:flex;align-items:center;border:1.5px solid #E1E8F3;border-radius:14px;overflow:hidden;background:#fff">'+
            '<button class="btn" onclick="App.qty(-1)" style="border:none;background:#fff;width:44px;height:46px;font-size:22px">−</button>'+
            '<span style="width:48px;text-align:center;font-weight:900;font-size:18px">'+STATE.qty+'</span>'+
            '<button class="btn" onclick="App.qty(1)" style="border:none;background:#fff;width:44px;height:46px;font-size:22px">+</button>'+
          '</div>'+
        '</div>'+
        '<div class="reveal">'+
          '<button class="btn shine" onclick="App.scrollForm()" style="width:100%;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:16px;padding:17px;font-weight:900;font-size:18px;box-shadow:0 12px 28px rgba(37,99,235,.35)">🛒 اطلب الآن — الدفع عند الاستلام</button>'+
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:16px">'+
            '<div style="background:#fff;border:1px solid #E1E8F3;border-radius:14px;padding:13px 6px;text-align:center"><div style="font-size:22px">🚚</div><div style="font-size:11.5px;font-weight:700;color:#33415C;margin-top:5px">توصيل سريع</div></div>'+
            '<div style="background:#fff;border:1px solid #E1E8F3;border-radius:14px;padding:13px 6px;text-align:center"><div style="font-size:22px">💳</div><div style="font-size:11.5px;font-weight:700;color:#33415C;margin-top:5px">الدفع عند الاستلام</div></div>'+
            '<div style="background:#fff;border:1px solid #E1E8F3;border-radius:14px;padding:13px 6px;text-align:center"><div style="font-size:22px">✅</div><div style="font-size:11.5px;font-weight:700;color:#33415C;margin-top:5px">ضمان الجودة</div></div>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    /* order form */
    '<div id="orderform" class="reveal" style="background:#fff;border:1px solid #E1E8F3;border-radius:24px;padding:26px;margin:40px auto 0;max-width:640px;box-shadow:0 20px 50px rgba(14,27,51,.08)">'+
      '<div style="text-align:center"><span style="background:#0E1B33;color:#fff;font-weight:800;font-size:12.5px;padding:6px 16px;border-radius:30px">عمّر المعلومات 👇</span>'+
      '<h2 style="font-size:24px;font-weight:900;margin:14px 0 22px">معلومات الطلب</h2></div>'+
      '<div style="margin-bottom:15px"><label class="lab">الاسم الكامل *</label><input id="f_name" class="fld'+(e.name?' err':'')+'" placeholder="الاسم و النسب" value="'+esc(STATE.fname||"")+'">'+(e.name?'<p class="errmsg">'+e.name+'</p>':'')+'</div>'+
      '<div style="margin-bottom:15px"><label class="lab">رقم الهاتف *</label><input id="f_phone" class="fld'+(e.phone?' err':'')+'" style="direction:ltr;text-align:right" inputmode="tel" placeholder="06xxxxxxxx" value="'+esc(STATE.fphone||"")+'">'+(e.phone?'<p class="errmsg">'+e.phone+'</p>':'')+'</div>'+
      '<div style="margin-bottom:15px;position:relative"><label class="lab">المدينة *</label>'+
        '<input id="f_city" class="fld'+(e.city?' err':'')+'" placeholder="اكتب اسم المدينة…" value="'+esc(STATE.city)+'" oninput="App.cityInput(this.value)" onfocus="App.cityOpen=true;App.renderCityDD()" autocomplete="off">'+
        '<div id="city_dd" style="position:absolute;top:100%;left:0;right:0;z-index:20;margin-top:5px;background:#fff;border:1px solid #E1E8F3;border-radius:14px;box-shadow:0 16px 36px rgba(14,27,51,.14);max-height:220px;overflow-y:auto;padding:5px;display:none"></div>'+
        (e.city?'<p class="errmsg">'+e.city+'</p>':'')+
      '</div>'+
      '<div style="margin-bottom:20px"><label class="lab">العنوان *</label><textarea id="f_addr" class="fld'+(e.addr?' err':'')+'" rows="2" style="resize:vertical" placeholder="الحي، الزنقة، رقم المنزل…">'+esc(STATE.faddr||"")+'</textarea>'+(e.addr?'<p class="errmsg">'+e.addr+'</p>':'')+'</div>'+
      '<div style="background:#F2F6FC;border-radius:15px;padding:16px;margin-bottom:18px">'+
        '<div style="display:flex;justify-content:space-between;font-size:14.5px;margin-bottom:7px"><span style="color:#78859E">'+esc(p.name)+' × '+STATE.qty+'</span><span style="font-weight:700">'+money(total)+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:14.5px;margin-bottom:9px"><span style="color:#78859E">التوصيل</span><span style="color:#0EA5A0;font-weight:700">مجاني</span></div>'+
        '<div style="display:flex;justify-content:space-between;border-top:1px dashed #E1E8F3;padding-top:10px"><span style="font-weight:900;font-size:17px">المجموع</span><span style="font-weight:900;font-size:21px;color:#2563EB">'+money(total)+'</span></div>'+
      '</div>'+
      '<button id="submitbtn" class="btn shine" onclick="App.submit()" style="width:100%;background:linear-gradient(135deg,#14B8A6,#0E9488);color:#fff;border:none;border-radius:16px;padding:17px;font-weight:900;font-size:18px;box-shadow:0 12px 26px rgba(14,165,160,.32)">✅ تأكيد الطلب</button>'+
      '<p style="text-align:center;color:#78859E;font-size:12.5px;margin-top:11px">🔒 الدفع عند الاستلام — بلا خلاص مسبق</p>'+
    '</div>';

  /* description */
  if(p.description){
    h += '<div style="max-width:840px;margin:46px auto 0">'+
      '<div class="reveal"><h2 style="font-size:23px;font-weight:900;margin-bottom:14px;border-right:4px solid #2563EB;padding-right:13px">تفاصيل المنتج</h2>'+
      '<p style="color:#33415C;line-height:2;white-space:pre-wrap;font-size:16.5px">'+esc(p.description)+'</p></div>';
    p.long_images.forEach(function(s){ h+='<div class="zoom reveal" style="border-radius:18px;margin-top:18px;border:1px solid #E1E8F3"><img src="'+esc(s)+'" style="width:100%"></div>'; });
    h += '</div>';
  }

  /* mobile bar */
  h += '<div class="mobilebar hide-lg" style="position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid #E1E8F3;padding:10px 16px;display:flex;align-items:center;gap:12px">'+
    '<div style="flex:1"><div style="font-weight:900;font-size:18px;color:#2563EB;line-height:1">'+money(p.price)+'</div>'+(off>0?'<div style="color:#78859E;text-decoration:line-through;font-size:12px">'+money(p.oldPrice)+'</div>':'')+'</div>'+
    '<button class="btn shine" onclick="App.scrollForm()" style="background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:13px;padding:13px 22px;font-weight:900;font-size:15.5px">اطلب الآن</button>'+
  '</div>';

  h += '</div>' + footerHTML();
  el("app").innerHTML = h;
  applyReveals();
  App.cityOpen=false;
}

function renderDone(){
  var p=STATE.product, total=p.price*STATE.qty;
  el("app").innerHTML = headerHTML() + '<div style="max-width:560px;margin:0 auto;padding:64px 18px;text-align:center">'+
    '<div style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#14B8A6,#0E9488);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:20px;animation:scaleIn .5s cubic-bezier(.2,.7,.2,1);box-shadow:0 12px 30px rgba(14,165,160,.4)">✓</div>'+
    '<h1 style="font-size:27px;font-weight:900">تم تسجيل طلبك!</h1>'+
    '<p style="color:#78859E;font-size:16px;margin:10px 0 6px">غادي نتواصلو معاك قريباً لتأكيد الطلب.</p>'+
    '<p style="font-weight:800;font-size:17px">'+esc(p.name)+' × '+STATE.qty+' — '+money(total)+'</p>'+
    '<button class="btn" onclick="App.home()" style="margin-top:24px;background:#0E1B33;color:#fff;border:none;border-radius:14px;padding:13px 26px;font-weight:800">متابعة التسوق</button>'+
  '</div>' + footerHTML();
}

function renderSetup(){
  el("app").innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">'+
    '<div style="max-width:470px;background:#fff;border:1px solid #E1E8F3;border-radius:20px;padding:30px;text-align:center;box-shadow:0 16px 40px rgba(14,27,51,.08)">'+
    '<div style="font-size:46px">⚙️</div><h1 style="font-size:21px;font-weight:900;margin:12px 0 8px">الموقع مازال غير مربوط</h1>'+
    '<p style="color:#33415C;line-height:1.9;font-size:15px;margin:0">عمّر مفاتيح <b>Supabase</b> ف الملف <b>config.js</b>.</p>'+
    '<div style="text-align:left;background:#E8F0FE;border-radius:12px;padding:14px;font-size:12.5px;margin-top:14px;direction:ltr;font-family:monospace;line-height:1.7">SUPABASE_URL: "https://xxx.supabase.co"<br>SUPABASE_KEY: "sb_publishable_xxx"</div></div></div>';
}

/* ===================== CONTROLLER ===================== */
var App = {
  cityOpen:false,
  home:function(){ STATE.product=null; STATE.errors={}; window.scrollTo(0,0); renderHome(); },
  open:function(id){ STATE.product = STATE.products.find(function(p){return p.id===id;}); STATE.main=0; STATE.qty=1; STATE.city=""; STATE.errors={}; STATE.fname="";STATE.fphone="";STATE.faddr=""; window.scrollTo(0,0); renderLanding(); },
  setMain:function(i){ STATE.main=i; var img=el("mainimg"); if(img){ img.style.opacity="0"; setTimeout(function(){ img.src=STATE.product.images[i]; img.style.opacity="1"; },160);} document.querySelectorAll(".thumb").forEach(function(t,idx){ t.style.border = idx===i?"2.5px solid #2563EB":"1.5px solid #E1E8F3"; }); },
  qty:function(d){ STATE.qty=Math.max(1,STATE.qty+d); this._saveInputs(); renderLanding(); this._restoreScrollToForm(false); },
  scrollForm:function(){ var f=el("orderform"); if(f) f.scrollIntoView({behavior:"smooth",block:"center"}); },
  _saveInputs:function(){ if(el("f_name"))STATE.fname=el("f_name").value; if(el("f_phone"))STATE.fphone=el("f_phone").value; if(el("f_addr"))STATE.faddr=el("f_addr").value; },
  _restoreScrollToForm:function(){},
  cityInput:function(v){ STATE.city=v; this.cityOpen=true; this.renderCityDD(); },
  renderCityDD:function(){ var dd=el("city_dd"); if(!dd) return; var q=STATE.city.trim(); var matches=(q?CITIES.filter(function(c){return c.indexOf(q)>=0;}):CITIES).slice(0,10); if(!this.cityOpen||matches.length===0){ dd.style.display="none"; return; } dd.style.display="block"; dd.innerHTML=matches.map(function(c){ return '<button type="button" class="cityopt" onmousedown="App.pickCity(\''+c.replace(/'/g,"")+'\')">'+c+'</button>'; }).join(""); },
  pickCity:function(c){ STATE.city=c; this.cityOpen=false; var i=el("f_city"); if(i) i.value=c; var dd=el("city_dd"); if(dd) dd.style.display="none"; },
  submit:function(){
    var name=(el("f_name").value||"").trim();
    var phone=(el("f_phone").value||"").trim();
    var city=(el("f_city").value||"").trim();
    var addr=(el("f_addr").value||"").trim();
    var e={};
    if(!name) e.name="المرجو إدخال الاسم الكامل";
    if(phone.replace(/\D/g,"").length<10) e.phone="رقم هاتف غير صحيح (10 أرقام)";
    if(CITIES.indexOf(city)<0) e.city="المرجو اختيار المدينة من اللائحة";
    if(!addr) e.addr="المرجو إدخال العنوان";
    STATE.fname=name;STATE.fphone=phone;STATE.city=city;STATE.faddr=addr;STATE.errors=e;
    if(Object.keys(e).length){ renderLanding(); this.scrollForm(); return; }
    var btn=el("submitbtn"); if(btn){ btn.textContent="جاري الإرسال…"; btn.style.opacity=".7"; }
    var p=STATE.product, total=p.price*STATE.qty;
    insertOrder({ name:name, phone:phone, city:city, address:addr, items:[{id:p.id,name:p.name,price:p.price,qty:STATE.qty,image:p.images[0]||""}], total:total, status:"new" },
      function(){ window.scrollTo(0,0); renderDone(); },
      function(err){ alert("خطأ: "+err.message); if(btn){btn.textContent="✅ تأكيد الطلب";btn.style.opacity="1";} });
  }
};
window.App = App;

document.addEventListener("click", function(ev){ if(App.cityOpen && ev.target.id!=="f_city"){ App.cityOpen=false; var dd=el("city_dd"); if(dd) dd.style.display="none"; } });

/* ===================== START ===================== */
if(!CONFIGURED || !sb){ renderSetup(); }
else { loadProducts(function(list){ STATE.products=list; renderHome(); }); }
</script>
</body>
</html>
