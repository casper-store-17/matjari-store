.fld.err{border-color:#E23D3D;}

.errmsg{color:#E23D3D;font-size:13px;margin:6px 0 0;}

.cityopt:hover{background:var(--blueBg);}
.shine{position:relative;overflow:hidden;}
.shine::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s;}
.shine:hover::after{left:130%;}
.mobilebar{animation:slideUp .4s cubic-bezier(.2,.7,.2,1);}

/* ===== 🎁 Bundles & 🎟️ Coupon pricing ===== */
function currentSubtotal(){
  var p=STATE.product; if(!p) return 0;
  if(STATE.bundle!==null && p.bundles[STATE.bundle]) return Number(p.bundles[STATE.bundle].price)||0;
  return p.price*STATE.qty;
}
function currentQty(){
  var p=STATE.product; if(!p) return STATE.qty;
  if(STATE.bundle!==null && p.bundles[STATE.bundle]) return Number(p.bundles[STATE.bundle].qty)||1;
  return STATE.qty;
}
function couponDiscount(sub){
  var c=STATE.coupon; if(!c) return 0;
  var d = c.type==="percent" ? sub*(Number(c.value)||0)/100 : (Number(c.value)||0);
  return Math.min(Math.round(d), sub);
}
function currentTotal(){ var sub=currentSubtotal(); return sub - couponDiscount(sub); }

function norm(p){
  var tr=p.tr||{};
  return { id:p.id, price:Number(p.price)||0, oldPrice:Number(p.old_price)||0,
    images:arr(p.images), long_images:arr(p.long_images),
    rating:Number(p.rating)||5, reviews:Number(p.reviews)||0, sold:Number(p.sold)||0, bundles:arr(p.bundles).filter(function(b){return b&&Number(b.qty)>=2&&Number(b.price)>0;}).sort(function(a,b){return a.qty-b.qty;}),
    trName: tr.name || (p.name?{ar:p.name}:{}), trTag: tr.tagline || (p.tagline?{ar:p.tagline}:{}),
    trDesc: tr.description || (p.description?{ar:p.description}:{}), trBen: tr.benefits || (arr(p.benefits).length?{ar:arr(p.benefits)}:{}) };
}

/* ===== 🔗 روابط مباشرة للمنتجات (للإعلانات) ===== */
function shortId(id){ return String(id).replace(/-/g,"").slice(0,10); }
function slugName(p){ var nm=pick(p.trName)||""; return encodeURIComponent(nm.trim().replace(/\s+/g,"-").replace(/[\/#?&%]/g,"").slice(0,60)); }
function productHash(p){ return "#p/"+slugName(p)+"/"+shortId(p.id); }
function findByHash(){
  var h=decodeURIComponent(location.hash||"");
  if(h.indexOf("#p/")!==0) return null;
  var parts=h.slice(3).split("/").filter(Boolean);
  if(!parts.length) return null;
  var sid=parts[parts.length-1].toLowerCase();
  return STATE.products.find(function(p){ return shortId(p.id).toLowerCase()===sid || String(p.id).toLowerCase()===sid; })||null;
}
var ROUTING=false;
function routeFromHash(){
  ROUTING=true;
  var p=findByHash();
  if(p){ App.open(p.id); } else { STATE.product=null; STATE.errors={}; window.scrollTo(0,0); renderHome(); }
  ROUTING=false;
}
function loadProducts(cb){ sb.from("products").select("*").order("created_at",{ascending:false}).then(function(r){ if(r.error){console.error(r.error);cb([]);return;} cb((r.data||[]).map(norm)); }); }
function insertOrder(o,cb,err){ sb.from("orders").insert(o).then(function(r){ if(r.error) err(r.error); else cb(); }); }

  _cap:function(){ if(el("f_name"))STATE.fname=el("f_name").value;if(el("f_phone"))STATE.fphone=el("f_phone").value;if(el("f_addr"))STATE.faddr=el("f_addr").value;if(el("f_coupon"))STATE.couponInput=el("f_coupon").value; },
  cityInput:function(v){ STATE.city=v;this.cityOpen=true;this.renderCityDD(); },
  renderCityDD:function(){ var dd=el("city_dd");if(!dd)return;var q=STATE.city.trim();var m=(q?CITIES.filter(function(c){return c.ar.indexOf(q)>=0||c.fr.toLowerCase().indexOf(q.toLowerCase())>=0;}):CITIES).slice(0,10);if(!this.cityOpen||m.length===0){dd.style.display="none";return;}dd.style.display="block";dd.innerHTML=m.map(function(c){return '<button type="button" class="cityopt" onmousedown="App.pickCity(\''+c.ar+'\')">'+cityName(c)+'</button>';}).join(""); },
  pickCity:function(ar){ var c=CITIES.find(function(x){return x.ar===ar;});STATE.city=c?cityName(c):ar;this.cityOpen=false;var i=el("f_city");if(i)i.value=STATE.city;var dd=el("city_dd");if(dd)dd.style.display="none"; },
  submit:function(){ var name=(el("f_name").value||"").trim(),phone=(el("f_phone").value||"").trim(),city=(el("f_city").value||"").trim(),addr=(el("f_addr").value||"").trim();
    var e={};if(!name)e.name=1;if(phone.replace(/\D/g,"").length<10)e.phone=1;var ok=CITIES.some(function(c){return c.ar===city||c.fr===city;});if(!ok)e.city=1;if(!addr)e.addr=1;
    STATE.fname=name;STATE.fphone=phone;STATE.city=city;STATE.faddr=addr;STATE.errors=e;
    if(Object.keys(e).length){renderLanding();this.scrollForm();return;}
    var cobj=CITIES.find(function(c){return c.ar===city||c.fr===city;}); var cityAr=cobj?cobj.ar:city;
    var btn=el("submitbtn");if(btn){btn.textContent=t().sending;btn.style.opacity=".7";}
    var p=STATE.product,qtyF=currentQty(),sub=currentSubtotal(),disc=couponDiscount(sub),total=sub-disc,nm=pick(p.trName);
    var unitP=Math.round(sub/qtyF);var orderObj={name:name,phone:phone,city:cityAr,address:addr,items:[{id:p.id,name:nm,price:unitP,qty:qtyF,image:p.images[0]||""}],total:total,status:"new",coupon:STATE.coupon?STATE.coupon.code:"",discount:disc};
    insertOrder(orderObj,
      function(){ trackPurchase(p,nm,qtyF,total); notifyOrder({brand:BRAND,name:name,phone:phone,city:cityAr,address:addr,product:nm,qty:qtyF,total:total,coupon:STATE.coupon?STATE.coupon.code:"",date:new Date().toISOString()}); window.scrollTo(0,0);renderDone();},
      function(err){alert("خطأ: "+err.message);if(btn){btn.textContent=t().confirm;btn.style.opacity="1";}}); }
};
window.App=App;
document.addEventListener("click",function(ev){ if(App.cityOpen&&ev.target.id!=="f_city"){App.cityOpen=false;var dd=el("city_dd");if(dd)dd.style.display="none";} });

applyDoc();
initPixels();
if(!CONFIGURED||!sb){ renderSetup(); } else { loadProducts(function(list){STATE.products=list; routeFromHash();}); }
window.addEventListener("hashchange",function(){ if(STATE.products.length) routeFromHash(); });
window.addEventListener("popstate",function(){ if(STATE.products.length) routeFromHash(); });
</script>
