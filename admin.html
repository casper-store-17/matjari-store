<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لوحة التحكم — متجري</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
:root{--bg:#F2F6FC;--surface:#fff;--ink:#0E1B33;--sub:#33415C;--muted:#78859E;--border:#E1E8F3;--line:#EDF1F8;--shadow:rgba(14,27,51,.08);--accent:#2563EB;--teal:#0EA5A0;--red:#E23D3D;--amber:#E3A008;--violet:#7C3AED;}
html[data-theme="dark"]{--bg:#0A101E;--surface:#141D30;--ink:#EAF0FA;--sub:#B7C2D4;--muted:#8291A8;--border:#27334C;--line:#1C2740;--shadow:rgba(0,0,0,.5);}
*{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--ink);}
body,button,input,textarea,select{font-family:'Tajawal',system-ui,'Segoe UI',Tahoma,sans-serif;}
.btn{transition:transform .18s;cursor:pointer;} .btn:hover{transform:translateY(-1px);} .btn:active{transform:scale(.98);}
.fld{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;background:var(--surface);color:var(--ink);outline:none;}
.fld:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(37,99,235,.14);}
.lab{display:block;font-weight:700;font-size:14px;margin-bottom:6px;color:var(--sub);}
.wrap{max-width:1040px;margin:0 auto;padding:0 18px;}
.grad{background:linear-gradient(135deg,#3B82F6,#1D4ED8);}
.g2{display:grid;gap:14px;} @media(min-width:640px){.g2{grid-template-columns:repeat(2,1fr);}}
.langtab{border:none;background:var(--line);color:var(--sub);border-radius:10px;padding:7px 14px;font-weight:800;cursor:pointer;font-size:13px;}
.langtab.on{background:var(--accent);color:#fff;}
.iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.16);color:#fff;cursor:pointer;font-size:15px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 8px 24px var(--shadow);}
.dgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;} @media(min-width:760px){.dgrid{grid-template-columns:repeat(4,1fr);}}
.pill{border:1.5px solid var(--border);background:var(--surface);color:var(--sub);border-radius:30px;padding:7px 15px;font-weight:800;font-size:13px;cursor:pointer;}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.ghost{background:var(--surface);color:var(--accent);border:1.5px solid var(--border);border-radius:12px;padding:10px 16px;font-weight:700;cursor:pointer;}
.bar{fill:var(--accent);opacity:.85;} .bar:hover{opacity:1;}
</style>
</head>
<body>
<div id="app" style="min-height:100vh"></div>
<script>
"use strict";
var CFG=window.STORE_CONFIG||{};var BRAND=CFG.BRAND||"متجري";
var CONFIGURED=CFG.SUPABASE_URL&&CFG.SUPABASE_URL.indexOf("http")===0&&CFG.SUPABASE_URL.indexOf("PUT_YOUR")<0&&CFG.SUPABASE_KEY&&CFG.SUPABASE_KEY.indexOf("PUT_YOUR")<0;
var sb=null;if(CONFIGURED&&window.supabase){try{sb=window.supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_KEY);}catch(e){console.error(e);}}
var THEME=localStorage.getItem("theme")||"dark";
function money(n){return (Number(n||0)).toLocaleString("fr-MA")+" د.م.";}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function el(id){return document.getElementById(id);}
function arr(x){return Array.isArray(x)?x:[];}
function isToday(d){var x=new Date(d),n=new Date();return x.getFullYear()===n.getFullYear()&&x.getMonth()===n.getMonth()&&x.getDate()===n.getDate();}
function dayKey(d){var x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
var LANGS=[["ar","العربية"],["fr","Français"],["en","English"],["es","Español"]];
var SMETA={"new":{l:"جديد",c:"var(--amber)"},confirmed:{l:"مؤكد",c:"var(--teal)"},shipped:{l:"تم الشحن",c:"var(--accent)"},delivered:{l:"تم التوصيل",c:"var(--violet)"},cancelled:{l:"ملغى",c:"var(--red)"},returned:{l:"مرتجع",c:"#B45309"}};
var FLOW={"new":["confirmed","cancelled"],confirmed:["shipped","cancelled"],shipped:["delivered","returned"],delivered:[],cancelled:[],returned:[]};
var NEXT_LABEL={confirmed:"✓ تأكيد",cancelled:"✕ إلغاء",shipped:"📦 تم الشحن",delivered:"🏠 تم التوصيل",returned:"↩ مرتجع"};
var REVENUE_STATUSES=["confirmed","shipped","delivered"];
var STATE={session:null,tab:"dash",products:[],orders:[],coupons:[],editing:null,editLang:"ar",uploading:false,loginErr:"",ordFilter:"all",ordSearch:"",chartDays:7};
function applyTheme(){document.documentElement.setAttribute("data-theme",THEME==="dark"?"dark":"light");}

function loadAll(cb){sb.from("products").select("*").order("created_at",{ascending:false}).then(function(r1){STATE.products=r1.data||[];sb.from("orders").select("*").order("created_at",{ascending:false}).then(function(r2){STATE.orders=r2.data||[];sb.from("coupons").select("*").order("created_at",{ascending:false}).then(function(r3){STATE.coupons=r3.data||[];cb&&cb();});});});}
function uploadImage(file,cb,err){var ext=(file.name.split(".").pop()||"jpg").toLowerCase();var path=Date.now()+"-"+Math.random().toString(36).slice(2,8)+"."+ext;sb.storage.from("product-images").upload(path,file,{cacheControl:"3600",upsert:false}).then(function(res){if(res.error){err(res.error);return;}cb(sb.storage.from("product-images").getPublicUrl(path).data.publicUrl);});}
function shortId(id){ return String(id).replace(/-/g,"").slice(0,10); }
function slugOf(p){ var tr=p.tr||{}; var nm=(tr.name&&(tr.name.ar||tr.name.fr||tr.name.en||tr.name.es))||p.name||""; return encodeURIComponent(String(nm).trim().replace(/\s+/g,"-").replace(/[\/#?&%]/g,"").slice(0,60)); }
function productLink(p){ var base=(CFG.SITE_URL||"").replace(/\/+$/,""); return (base||location.origin)+"/#p/"+slugOf(p)+"/"+shortId(p.id); }
function revenueOf(list){return list.filter(function(o){return REVENUE_STATUSES.indexOf(o.status)>=0;}).reduce(function(s,o){return s+(Number(o.total)||0);},0);}

function renderSetup(){el("app").innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="max-width:470px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px;text-align:center;box-shadow:0 16px 40px var(--shadow)"><div style="font-size:46px">⚙️</div><h1 style="font-size:21px;font-weight:900;margin:12px 0 8px">لوحة التحكم مازال غير مربوطة</h1><p style="color:var(--sub);font-size:15px">عمّر مفاتيح Supabase ف config.js.</p></div></div>';}
function renderLogin(){el("app").innerHTML='<header class="grad" style="color:#fff;padding:14px 18px"><div class="wrap" style="font-size:20px;font-weight:900">'+esc(BRAND)+' · لوحة التحكم</div></header><div style="max-width:400px;margin:0 auto;padding:64px 18px"><div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:0 16px 40px var(--shadow)"><h1 style="font-size:22px;font-weight:900;margin:0 0 18px">دخول</h1><label class="lab">البريد الإلكتروني</label><input id="l_email" class="fld" style="direction:ltr;margin-bottom:14px"><label class="lab">كلمة السر</label><input id="l_pwd" class="fld" type="password" onkeydown="if(event.key===\'Enter\')App.login()">'+(STATE.loginErr?'<p style="color:var(--red);font-size:13px;margin-top:6px">'+STATE.loginErr+'</p>':'')+'<button class="btn grad" onclick="App.login()" style="width:100%;margin-top:16px;color:#fff;border:none;border-radius:12px;padding:12px;font-weight:800;font-size:15px">دخول</button></div></div>';}

function tabBtn(id,label){var on=STATE.tab===id;return '<button class="btn" onclick="App.setTab(\''+id+'\')" style="background:none;border:none;color:#fff;font-weight:800;font-size:14px;padding:11px 10px;border-bottom:'+(on?"3px solid #fff":"3px solid transparent")+';opacity:'+(on?1:.75)+'">'+label+'</button>';}
function shell(content){var nc=STATE.orders.filter(function(o){return o.status==="new";}).length;
  return '<header class="grad" style="color:#fff;position:sticky;top:0;z-index:30;box-shadow:0 4px 16px rgba(37,99,235,.25)"><div class="wrap" style="display:flex;align-items:center;justify-content:space-between;padding-top:13px;padding-bottom:13px"><span style="font-size:20px;font-weight:900">'+esc(BRAND)+' <span style="opacity:.8;font-size:13px">· لوحة التحكم</span></span><div style="display:flex;gap:8px"><button class="btn iconbtn" onclick="App.toggleTheme()">'+(THEME==="dark"?"☀️":"🌙")+'</button><button class="btn" onclick="App.logout()" style="background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:10px;padding:8px 14px;font-weight:700">خروج</button></div></div>'+
  '<div class="wrap" style="display:flex;gap:2px;flex-wrap:wrap">'+tabBtn("dash","📊 لوحة القيادة")+tabBtn("products","المنتجات")+tabBtn("orders","الطلبات"+(nc>0?" ("+nc+")":""))+tabBtn("coupons","🎟️ الكوبونات")+'</div></header>'+content;
}

/* ============ DASHBOARD ============ */
function chartHTML(){
  var days=STATE.chartDays, now=new Date(), keys=[], labels=[];
  for(var i=days-1;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);keys.push(dayKey(d));labels.push(String(d.getDate()));}
  var revByDay={},cntByDay={};
  STATE.orders.forEach(function(o){ var k=dayKey(o.created_at); if(keys.indexOf(k)<0)return; cntByDay[k]=(cntByDay[k]||0)+1; if(REVENUE_STATUSES.indexOf(o.status)>=0) revByDay[k]=(revByDay[k]||0)+(Number(o.total)||0); });
  var max=1; keys.forEach(function(k){ if((revByDay[k]||0)>max)max=revByDay[k]; });
  var W=640,H=180,pad=6,bw=(W-pad*2)/keys.length;
  var bars=keys.map(function(k,i){ var v=revByDay[k]||0, h=Math.round((v/max)*(H-36)); var x=pad+i*bw;
    return '<g><rect class="bar" x="'+(x+bw*0.15)+'" y="'+(H-24-h)+'" width="'+(bw*0.7)+'" height="'+h+'" rx="6"><title>'+labels[i]+' : '+money(v)+' ('+(cntByDay[k]||0)+' طلب)</title></rect>'+
      '<text x="'+(x+bw/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="var(--muted)">'+labels[i]+'</text></g>'; }).join("");
  return '<div class="stat" style="margin-top:16px"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px"><b style="font-size:15px">📈 مبيعات آخر '+days+' يوم (المؤكدة+المشحونة+الموصّلة)</b><div style="display:flex;gap:6px"><button class="pill '+(days===7?"on":"")+'" onclick="App.setChart(7)">7 أيام</button><button class="pill '+(days===30?"on":"")+'" onclick="App.setChart(30)">30 يوم</button></div></div>'+
    '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+bars+'</svg></div>';
}
function topProductsHTML(){
  var m={};
  STATE.orders.forEach(function(o){ if(REVENUE_STATUSES.indexOf(o.status)<0)return; arr(o.items).forEach(function(it){ var k=it.name||"?"; m[k]=m[k]||{qty:0,rev:0}; m[k].qty+=Number(it.qty)||0; m[k].rev+=(Number(it.price)||0)*(Number(it.qty)||0); }); });
  var list=Object.keys(m).map(function(k){return {name:k,qty:m[k].qty,rev:m[k].rev};}).sort(function(a,b){return b.rev-a.rev;}).slice(0,5);
  if(!list.length) return "";
  var rows=list.map(function(p,i){ return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)"><span><b style="color:var(--accent)">'+(i+1)+'.</b> '+esc(p.name)+' <span style="color:var(--muted);font-size:12px">× '+p.qty+'</span></span><b>'+money(p.rev)+'</b></div>'; }).join("");
  return '<div class="stat" style="margin-top:16px"><b style="font-size:15px">🏆 أفضل المنتجات مبيعاً</b><div style="margin-top:8px">'+rows+'</div></div>';
}
function renderDash(){
  var ords=STATE.orders;
  var totalRev=revenueOf(ords);
  var todayAll=ords.filter(function(o){return isToday(o.created_at);});
  var todayRev=revenueOf(todayAll);
  var counts={}; Object.keys(SMETA).forEach(function(s){counts[s]=ords.filter(function(o){return o.status===s;}).length;});
  var confirmRate = ords.length? Math.round((ords.filter(function(o){return REVENUE_STATUSES.indexOf(o.status)>=0;}).length/ords.length)*100) : 0;
  function card(icon,val,label,color){return '<div class="stat"><div style="font-size:26px">'+icon+'</div><div style="font-size:23px;font-weight:900;margin-top:8px;color:'+color+'">'+val+'</div><div style="color:var(--muted);font-size:13px;font-weight:600;margin-top:2px">'+label+'</div></div>';}
  var pills=Object.keys(SMETA).map(function(s){return '<div class="stat" style="flex:1;min-width:105px;padding:13px;text-align:center"><div style="font-weight:900;font-size:19px;color:'+SMETA[s].c+'">'+counts[s]+'</div><div style="color:var(--muted);font-size:12px">'+SMETA[s].l+'</div></div>';}).join("");
  var c='<div class="wrap" style="padding-top:24px;padding-bottom:30px">'+
    '<h1 style="font-size:22px;font-weight:900;margin:0 0 4px">لوحة القيادة</h1>'+
    '<p style="color:var(--muted);margin:0 0 20px;font-size:14px">'+new Date().toLocaleDateString("ar-MA")+' · نسبة التأكيد: <b style="color:var(--teal)">'+confirmRate+'%</b></p>'+
    '<div class="dgrid">'+card("💰",money(totalRev),"إجمالي الأرباح","var(--teal)")+card("📦",ords.length,"إجمالي الطلبات","var(--accent)")+card("🗓️",todayAll.length,"طلبات اليوم","var(--amber)")+card("📈",money(todayRev),"أرباح اليوم","var(--teal)")+'</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">'+pills+'</div>'+
    chartHTML()+ topProductsHTML()+
  '</div>';
  el("app").innerHTML=shell(c);
}

/* ============ PRODUCTS ============ */
function imgRow(list,key){return '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px">'+list.map(function(src,i){return '<div style="position:relative"><img src="'+esc(src)+'" style="width:74px;height:74px;object-fit:cover;border-radius:10px;border:1px solid var(--border)"><button onclick="App.removeImg(\''+key+'\','+i+')" style="position:absolute;top:-8px;inset-inline-end:-8px;background:var(--red);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-weight:800">×</button></div>';}).join("")+'<label style="width:74px;height:74px;border:1.5px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:11px;text-align:center;padding:4px">'+(STATE.uploading?"…":"＋ صور")+'<input type="file" accept="image/*" multiple onchange="App.onFile(this,\''+key+'\')" style="display:none"></label></div>';}
function bundleRows(ed){
  var rows=ed.bundles.map(function(b,i){ return '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><input type="number" min="2" class="fld" style="width:90px;direction:ltr" value="'+esc(b.qty)+'" onchange="App.bundleChange('+i+',\'qty\',this.value)" placeholder="الكمية"><span style="color:var(--muted)">قطع بـ</span><input type="number" class="fld" style="width:130px;direction:ltr" value="'+esc(b.price)+'" onchange="App.bundleChange('+i+',\'price\',this.value)" placeholder="الثمن"><span style="color:var(--muted)">د.م.</span><button class="btn" onclick="App.bundleRemove('+i+')" style="background:none;border:none;color:var(--red);font-weight:900;font-size:18px">×</button></div>'; }).join("");
  return rows+'<button class="btn ghost" onclick="App.bundleAdd()" style="font-size:13px;padding:8px 14px">＋ زيد عرض كمية</button><p style="color:var(--muted);font-size:12px;margin:8px 0 0">مثال: 2 قطع بـ 349 درهم — كيبان للزبون ف صفحة المنتج.</p>';
}
function renderProducts(){
  var ed=STATE.editing,L=STATE.editLang;
  var c='<div class="wrap" style="padding-top:22px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h1 style="font-size:22px;font-weight:900;margin:0">إدارة المنتجات</h1>'+(ed?"":'<button class="btn grad" onclick="App.addNew()" style="color:#fff;border:none;border-radius:12px;padding:11px 18px;font-weight:800">＋ إضافة منتج</button>')+'</div>';
  if(ed){
    var tabs=LANGS.map(function(l){return '<button class="btn langtab '+(L===l[0]?"on":"")+'" onclick="App.setEditLang(\''+l[0]+'\')">'+l[1]+'</button>';}).join(" ");
    c+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px var(--shadow)">'+
      '<h2 style="font-weight:900;margin:0 0 14px">'+(ed.id?"تعديل المنتج":"منتج جديد")+'</h2>'+
      '<div style="background:var(--line);padding:6px;border-radius:14px;display:inline-flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">'+tabs+'</div>'+
      '<div class="g2"><div><label class="lab">اسم المنتج ('+L+') *</label><input id="ef_name" class="fld" value="'+esc(ed.name[L]||"")+'"></div><div><label class="lab">وصف قصير ('+L+')</label><input id="ef_tag" class="fld" value="'+esc(ed.tagline[L]||"")+'"></div></div>'+
      '<div style="margin-top:14px"><label class="lab">المميزات ('+L+') — كل ميزة ف سطر</label><textarea id="ef_ben" class="fld" rows="4" style="resize:vertical">'+esc(ed.benefits[L]||"")+'</textarea></div>'+
      '<div style="margin-top:14px"><label class="lab">الوصف المفصّل ('+L+')</label><textarea id="ef_desc" class="fld" rows="4" style="resize:vertical">'+esc(ed.description[L]||"")+'</textarea></div>'+
      '<hr style="border:none;border-top:1px solid var(--line);margin:20px 0"><p style="color:var(--muted);font-size:13px;margin:0 0 12px">⬇️ مشتركين لكل اللغات:</p>'+
      '<div class="g2"><div><label class="lab">الثمن (د.م.) *</label><input id="ef_price" type="number" class="fld" style="direction:ltr" value="'+esc(ed.price)+'"></div><div><label class="lab">الثمن القديم (للخصم)</label><input id="ef_old" type="number" class="fld" style="direction:ltr" value="'+esc(ed.old_price)+'"></div></div>'+
      '<div style="margin-top:14px"><label class="lab">🎁 عروض الكمية</label>'+bundleRows(ed)+'</div>'+
      '<div style="margin-top:14px"><label class="lab">صور المنتج — الأولى هي الرئيسية</label>'+imgRow(ed.images,"images")+'</div>'+
      '<div style="margin-top:6px"><label class="lab">صور التفاصيل (اختياري)</label>'+imgRow(ed.long_images,"long_images")+'</div>'+
      '<div class="g2" style="margin-top:14px"><div><label class="lab">التقييم (0-5)</label><input id="ef_rating" type="number" step="0.1" max="5" class="fld" style="direction:ltr" value="'+esc(ed.rating)+'"></div><div><label class="lab">عدد التقييمات</label><input id="ef_reviews" type="number" class="fld" style="direction:ltr" value="'+esc(ed.reviews)+'"></div><div><label class="lab">عدد المبيعات</label><input id="ef_sold" type="number" class="fld" style="direction:ltr" value="'+esc(ed.sold)+'"></div></div>'+
      '<div style="display:flex;gap:10px;margin-top:18px"><button class="btn grad" onclick="App.save()" style="color:#fff;border:none;border-radius:12px;padding:11px 18px;font-weight:800">حفظ</button><button class="btn ghost" onclick="App.cancelEdit()">إلغاء</button></div>'+
    '</div>';
  }
  if(STATE.products.length===0&&!ed){c+='<div style="background:var(--surface);border:1.5px dashed var(--border);border-radius:18px;padding:40px;text-align:center;color:var(--muted)">لا توجد منتجات بعد.</div>';}
  else{c+='<div style="display:grid;gap:12px">';
    STATE.products.forEach(function(p){var tr=p.tr||{};var nm=(tr.name&&(tr.name.ar||tr.name.fr))||p.name||"—";
      c+='<div style="display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px">'+(arr(p.images)[0]?'<img src="'+esc(p.images[0])+'" style="width:60px;height:60px;object-fit:cover;border-radius:10px">':'<div style="width:60px;height:60px;background:var(--line);border-radius:10px"></div>')+'<div style="flex:1"><div style="font-weight:800">'+esc(nm)+(arr(p.bundles).length?' <span style="font-size:11px;background:var(--line);color:var(--sub);border-radius:20px;padding:2px 8px">🎁 '+arr(p.bundles).length+' عروض</span>':'')+'</div><div style="color:var(--accent);font-weight:800;font-size:14px">'+money(p.price)+(p.old_price>p.price?'<span style="color:var(--muted);text-decoration:line-through;font-weight:500;margin-inline-start:8px">'+money(p.old_price)+'</span>':'')+'</div></div><button class="btn ghost" onclick="App.copyLink(\''+p.id+'\')" title="نسخ رابط المنتج">🔗</button><button class="btn ghost" onclick="App.edit(\''+p.id+'\')">تعديل</button><button class="btn" onclick="App.del(\''+p.id+'\')" style="background:var(--surface);color:var(--red);border:1.5px solid #F0CFCF;border-radius:12px;padding:10px 16px;font-weight:700">حذف</button></div>';
    });c+='</div>';}
  c+='</div>';el("app").innerHTML=shell(c);
}

/* ============ ORDERS ============ */
function ordersFiltered(){
  var f=STATE.ordFilter,q=STATE.ordSearch.trim().toLowerCase();
  return STATE.orders.filter(function(o){
    if(f!=="all"&&o.status!==f)return false;
    if(q){ var hay=(o.name+" "+o.phone+" "+o.city).toLowerCase(); if(hay.indexOf(q)<0)return false; }
    return true;
  });
}
function renderOrders(){
  var list=ordersFiltered();
  var pills='<button class="pill '+(STATE.ordFilter==="all"?"on":"")+'" onclick="App.setFilter(\'all\')">الكل ('+STATE.orders.length+')</button>'+
    Object.keys(SMETA).map(function(s){var n=STATE.orders.filter(function(o){return o.status===s;}).length;return '<button class="pill '+(STATE.ordFilter===s?"on":"")+'" onclick="App.setFilter(\''+s+'\')">'+SMETA[s].l+' ('+n+')</button>';}).join("");
  var c='<div class="wrap" style="padding-top:22px;padding-bottom:30px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px"><h1 style="font-size:22px;font-weight:900;margin:0">الطلبات</h1><div style="display:flex;gap:8px"><button class="btn ghost" onclick="App.exportCSV()">⬇️ تصدير CSV</button><button class="btn ghost" onclick="App.refresh()">↻ تحديث</button></div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+pills+'</div>'+
    '<input class="fld" style="margin-bottom:14px" placeholder="🔍 بحث بالاسم / الهاتف / المدينة…" value="'+esc(STATE.ordSearch)+'" oninput="App.setSearch(this.value)">';
  if(list.length===0){c+='<div style="background:var(--surface);border:1.5px dashed var(--border);border-radius:18px;padding:40px;text-align:center;color:var(--muted)">لا توجد طلبات.</div>';}
  else{c+='<div style="display:grid;gap:12px">';
    list.forEach(function(o){
      var st=SMETA[o.status]||SMETA["new"];
      var items=arr(o.items).map(function(it){return '<div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0"><span>'+esc(it.name)+' <span style="color:var(--muted)">× '+it.qty+'</span></span><span style="font-weight:700">'+money(it.price*it.qty)+'</span></div>';}).join("");
      var nexts=FLOW[o.status]||[];
      var btns=nexts.map(function(ns){ var danger=(ns==="cancelled"||ns==="returned");
        return '<button class="btn" onclick="App.setStatus(\''+o.id+'\',\''+ns+'\')" style="background:'+(danger?"var(--surface)":SMETA[ns].c)+';color:'+(danger?"var(--red)":"#fff")+';border:'+(danger?"1.5px solid var(--red)":"none")+';border-radius:10px;padding:9px 16px;font-weight:800;font-size:13px">'+NEXT_LABEL[ns]+'</button>'; }).join("");
      c+='<div style="background:var(--surface);border:1px solid '+st.c+';border-radius:16px;padding:16px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-weight:900">#'+String(o.id).slice(-6).toUpperCase()+'</span><span style="background:'+st.c+';color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:20px">'+st.l+'</span>'+(o.coupon?'<span style="background:var(--line);color:var(--sub);font-size:11px;font-weight:800;padding:2px 10px;border-radius:20px">🎟️ '+esc(o.coupon)+' (-'+money(o.discount)+')</span>':'')+'<span style="color:var(--muted);font-size:12px">'+new Date(o.created_at).toLocaleString("ar-MA")+'</span></div><span style="font-weight:900;color:var(--accent);font-size:18px">'+money(o.total)+'</span></div>'+
        '<div class="g2" style="font-size:14px;margin-bottom:12px"><div><span style="color:var(--muted)">الزبون: </span><b>'+esc(o.name)+'</b></div><div style="direction:ltr;text-align:right"><span style="color:var(--muted)">الهاتف: </span><b>'+esc(o.phone)+'</b></div><div><span style="color:var(--muted)">المدينة: </span><b>'+esc(o.city)+'</b></div><div><span style="color:var(--muted)">العنوان: </span><b>'+esc(o.address)+'</b></div></div>'+
        '<div style="border-top:1px solid var(--line);padding-top:10px">'+items+'</div>'+
        (btns?'<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">'+btns+'</div>':'<div style="margin-top:12px;color:'+st.c+';font-weight:800;font-size:14px">'+st.l+' ✓</div>')+
      '</div>';
    });c+='</div>';}
  c+='</div>';el("app").innerHTML=shell(c);
}

/* ============ COUPONS ============ */
function renderCoupons(){
  var c='<div class="wrap" style="padding-top:22px;padding-bottom:30px"><h1 style="font-size:22px;font-weight:900;margin:0 0 16px">🎟️ الكوبونات</h1>'+
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:18px;box-shadow:0 8px 24px var(--shadow)">'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">'+
      '<div style="flex:1;min-width:140px"><label class="lab">الكود</label><input id="c_code" class="fld" style="direction:ltr;text-transform:uppercase" placeholder="PROMO10"></div>'+
      '<div style="min-width:130px"><label class="lab">النوع</label><select id="c_type" class="fld"><option value="percent">نسبة %</option><option value="fixed">مبلغ ثابت (د.م.)</option></select></div>'+
      '<div style="min-width:110px"><label class="lab">القيمة</label><input id="c_value" type="number" class="fld" style="direction:ltr" placeholder="10"></div>'+
      '<button class="btn grad" onclick="App.addCoupon()" style="color:#fff;border:none;border-radius:12px;padding:12px 20px;font-weight:800">＋ إضافة</button>'+
    '</div></div>';
  if(STATE.coupons.length===0){c+='<div style="background:var(--surface);border:1.5px dashed var(--border);border-radius:18px;padding:36px;text-align:center;color:var(--muted)">لا توجد كوبونات. زيد أول كوبون فوق.</div>';}
  else{c+='<div style="display:grid;gap:10px">';
    STATE.coupons.forEach(function(cp){
      c+='<div style="display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 16px">'+
        '<span style="font-weight:900;font-size:16px;direction:ltr;background:var(--line);border-radius:9px;padding:5px 12px">'+esc(cp.code)+'</span>'+
        '<span style="flex:1;color:var(--sub);font-weight:700">'+(cp.type==="percent"?("خصم "+cp.value+"%"):("خصم "+money(cp.value)))+'</span>'+
        '<button class="btn" onclick="App.toggleCoupon(\''+cp.id+'\','+(!cp.active)+')" style="background:'+(cp.active?"var(--teal)":"var(--line)")+';color:'+(cp.active?"#fff":"var(--muted)")+';border:none;border-radius:20px;padding:7px 16px;font-weight:800;font-size:13px">'+(cp.active?"مفعّل ✓":"موقوف")+'</button>'+
        '<button class="btn" onclick="App.delCoupon(\''+cp.id+'\')" style="background:none;border:none;color:var(--red);font-weight:900;font-size:18px">×</button>'+
      '</div>';
    });c+='</div>';}
  c+='</div>';el("app").innerHTML=shell(c);
}

function renderMain(){ if(STATE.tab==="dash")renderDash(); else if(STATE.tab==="products")renderProducts(); else if(STATE.tab==="coupons")renderCoupons(); else renderOrders(); }

/* ============ CONTROLLER ============ */
var App={
  toggleTheme:function(){THEME=(THEME==="dark"?"light":"dark");localStorage.setItem("theme",THEME);applyTheme();renderMain();},
  login:function(){STATE.loginErr="";var email=(el("l_email").value||"").trim(),pwd=el("l_pwd").value||"";sb.auth.signInWithPassword({email:email,password:pwd}).then(function(res){if(res.error){STATE.loginErr="البريد أو كلمة السر غير صحيحة";renderLogin();}});},
  logout:function(){sb.auth.signOut();},
  setTab:function(t){STATE.tab=t;STATE.editing=null;renderMain();},
  refresh:function(){loadAll(function(){renderMain();});},
  setChart:function(d){STATE.chartDays=d;renderDash();},
  setFilter:function(f){STATE.ordFilter=f;renderOrders();},
  setSearch:function(v){STATE.ordSearch=v;var scroll=window.scrollY;renderOrders();var i=document.querySelector('input[placeholder^="🔍"]');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}window.scrollTo(0,scroll);},
  setStatus:function(id,status){sb.from("orders").update({status:status}).eq("id",id).then(function(res){if(res.error){alert(res.error.message);return;}loadAll(function(){renderMain();});});},
  exportCSV:function(){
    var list=ordersFiltered();
    if(!list.length){alert("لا توجد طلبات للتصدير");return;}
    var head=["ID","التاريخ","الحالة","الاسم","الهاتف","المدينة","العنوان","المنتجات","الكمية","الكوبون","التخفيض","المجموع"];
    function cell(v){v=String(v==null?"":v).replace(/"/g,'""');return '"'+v+'"';}
    var rows=list.map(function(o){
      var names=arr(o.items).map(function(it){return it.name+" x"+it.qty;}).join(" | ");
      var qty=arr(o.items).reduce(function(s,it){return s+(Number(it.qty)||0);},0);
      return [String(o.id).slice(-6).toUpperCase(),new Date(o.created_at).toLocaleString("fr-MA"),(SMETA[o.status]||{}).l||o.status,o.name,o.phone,o.city,o.address,names,qty,o.coupon||"",o.discount||0,o.total].map(cell).join(",");
    });
    var csv="\uFEFF"+head.map(cell).join(",")+"\n"+rows.join("\n");
    var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="orders-"+dayKey(new Date())+".csv";a.click();URL.revokeObjectURL(a.href);
  },
  addCoupon:function(){
    var code=(el("c_code").value||"").trim().toUpperCase(),type=el("c_type").value,val=Number(el("c_value").value)||0;
    if(!code||val<=0){alert("عمّر الكود والقيمة");return;}
    sb.from("coupons").insert({code:code,type:type,value:val,active:true}).then(function(res){if(res.error){alert("خطأ: "+(res.error.message.indexOf("duplicate")>=0?"هاد الكود موجود من قبل":res.error.message));return;}loadAll(function(){renderCoupons();});});
  },
  toggleCoupon:function(id,active){sb.from("coupons").update({active:active}).eq("id",id).then(function(res){if(res.error){alert(res.error.message);return;}loadAll(function(){renderCoupons();});});},
  delCoupon:function(id){if(!confirm("حذف هذا الكوبون؟"))return;sb.from("coupons").delete().eq("id",id).then(function(res){if(res.error){alert(res.error.message);return;}loadAll(function(){renderCoupons();});});},
  addNew:function(){STATE.editing={id:null,name:{},tagline:{},description:{},benefits:{},price:"",old_price:"",bundles:[],images:[],long_images:[],rating:"5",reviews:"0",sold:"0"};STATE.editLang="ar";renderProducts();},
  edit:function(id){var p=STATE.products.find(function(x){return x.id===id;});var tr=p.tr||{};
    function b(o){o=o||{};return {ar:o.ar||"",fr:o.fr||"",en:o.en||"",es:o.es||""};}
    var ben={};var tb=tr.benefits||{};["ar","fr","en","es"].forEach(function(L){ben[L]=arr(tb[L]).join("\n");});
    if(!tr.benefits&&arr(p.benefits).length)ben.ar=arr(p.benefits).join("\n");
    STATE.editing={id:p.id,name:b(tr.name||(p.name?{ar:p.name}:{})),tagline:b(tr.tagline||(p.tagline?{ar:p.tagline}:{})),description:b(tr.description||(p.description?{ar:p.description}:{})),benefits:ben,price:p.price||"",old_price:p.old_price||"",bundles:arr(p.bundles).map(function(x){return {qty:x.qty,price:x.price};}),images:arr(p.images),long_images:arr(p.long_images),rating:p.rating||"5",reviews:p.reviews||"0",sold:p.sold||"0"};
    STATE.editLang="ar";renderProducts();window.scrollTo(0,0);},
  cancelEdit:function(){STATE.editing=null;renderProducts();},
  setEditLang:function(L){this.capture();STATE.editLang=L;renderProducts();},
  bundleAdd:function(){this.capture();STATE.editing.bundles.push({qty:2,price:""});renderProducts();},
  bundleRemove:function(i){this.capture();STATE.editing.bundles.splice(i,1);renderProducts();},
  bundleChange:function(i,k,v){STATE.editing.bundles[i][k]=v;},
  capture:function(){var e=STATE.editing;if(!e)return;var L=STATE.editLang;if(el("ef_name"))e.name[L]=el("ef_name").value;if(el("ef_tag"))e.tagline[L]=el("ef_tag").value;if(el("ef_ben"))e.benefits[L]=el("ef_ben").value;if(el("ef_desc"))e.description[L]=el("ef_desc").value;if(el("ef_price"))e.price=el("ef_price").value;if(el("ef_old"))e.old_price=el("ef_old").value;if(el("ef_rating"))e.rating=el("ef_rating").value;if(el("ef_reviews"))e.reviews=el("ef_reviews").value;if(el("ef_sold"))e.sold=el("ef_sold").value;},
  onFile:function(input,key){var files=Array.prototype.slice.call(input.files||[]);if(!files.length)return;this.capture();STATE.uploading=true;renderProducts();var pending=files.length;files.forEach(function(f){uploadImage(f,function(url){STATE.editing[key]=STATE.editing[key].concat([url]);pending--;if(pending===0){STATE.uploading=false;renderProducts();}},function(err){alert("خطأ ف الرفع: "+err.message);pending--;if(pending===0){STATE.uploading=false;renderProducts();}});});},
  removeImg:function(key,i){this.capture();STATE.editing[key]=STATE.editing[key].filter(function(_,idx){return idx!==i;});renderProducts();},
  save:function(){this.capture();var e=STATE.editing;
    function clean(o){var r={};["ar","fr","en","es"].forEach(function(L){if((o[L]||"").trim())r[L]=o[L].trim();});return r;}
    function benObj(o){var r={};["ar","fr","en","es"].forEach(function(L){var a=(o[L]||"").split("\n").map(function(s){return s.trim();}).filter(Boolean);if(a.length)r[L]=a;});return r;}
    var nameO=clean(e.name);if(!nameO.ar&&!nameO.fr&&!nameO.en&&!nameO.es){alert("خاص اسم المنتج على الأقل بلغة وحدة");return;}
    var bundles=e.bundles.map(function(b){return {qty:Number(b.qty)||0,price:Number(b.price)||0};}).filter(function(b){return b.qty>=2&&b.price>0;});
    var tr={name:nameO,tagline:clean(e.tagline),description:clean(e.description),benefits:benObj(e.benefits)};
    var body={name:nameO.ar||nameO.fr||nameO.en||nameO.es||"",tagline:tr.tagline.ar||"",description:tr.description.ar||"",benefits:tr.benefits.ar||[],tr:tr,bundles:bundles,price:Number(e.price)||0,old_price:Number(e.old_price)||0,images:e.images,long_images:e.long_images,rating:Number(e.rating)||5,reviews:Number(e.reviews)||0,sold:Number(e.sold)||0};
    var q=e.id?sb.from("products").update(body).eq("id",e.id):sb.from("products").insert(body);
    q.then(function(res){if(res.error){alert("خطأ: "+res.error.message);return;}STATE.editing=null;loadAll(function(){renderProducts();});});},
  copyLink:function(id){ var p=STATE.products.find(function(x){return x.id===id;}); if(!p)return; var link=productLink(p);
    function ok(){ alert("\u2705 \u062a\u0646\u0633\u062e \u0627\u0644\u0631\u0627\u0628\u0637:\n"+link); }
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(ok,function(){ prompt("\u0627\u0646\u0633\u062e \u0627\u0644\u0631\u0627\u0628\u0637:",link); }); }
    else { prompt("\u0627\u0646\u0633\u062e \u0627\u0644\u0631\u0627\u0628\u0637:",link); } },
  del:function(id){if(!confirm("حذف هذا المنتج؟"))return;sb.from("products").delete().eq("id",id).then(function(res){if(res.error){alert(res.error.message);return;}loadAll(function(){renderProducts();});});}
};
window.App=App;
applyTheme();
if(!CONFIGURED||!sb){renderSetup();}
else{ sb.auth.getSession().then(function(res){STATE.session=res.data.session;if(STATE.session){loadAll(function(){renderMain();});}else{renderLogin();}});
  sb.auth.onAuthStateChange(function(_e,s){STATE.session=s;if(s){loadAll(function(){renderMain();});}else{renderLogin();}}); }
</script>
</body>
