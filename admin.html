<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لوحة التحكم — متجري</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box;} body{margin:0;background:#F2F6FC;color:#0E1B33;}
body,button,input,textarea{font-family:'Tajawal',system-ui,'Segoe UI',Tahoma,sans-serif;}
.btn{transition:transform .18s,box-shadow .18s;cursor:pointer;} .btn:hover{transform:translateY(-1px);} .btn:active{transform:scale(.98);}
.fld{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #E1E8F3;font-size:15px;background:#fff;color:#0E1B33;outline:none;}
.fld:focus{border-color:#2563EB;box-shadow:0 0 0 4px rgba(37,99,235,.14);}
.lab{display:block;font-weight:700;font-size:14px;margin-bottom:6px;color:#33415C;}
.wrap{max-width:1040px;margin:0 auto;padding:0 18px;}
.grad{background:linear-gradient(135deg,#3B82F6,#1D4ED8);}
.g2{display:grid;gap:14px;} @media(min-width:640px){.g2{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div id="app" style="min-height:100vh"></div>
<script>
"use strict";
var CFG = window.STORE_CONFIG || {};
var BRAND = CFG.BRAND || "متجري";
var CONFIGURED = CFG.SUPABASE_URL && CFG.SUPABASE_URL.indexOf("http")===0 && CFG.SUPABASE_URL.indexOf("PUT_YOUR")<0 && CFG.SUPABASE_KEY && CFG.SUPABASE_KEY.indexOf("PUT_YOUR")<0;
var sb=null;
if(CONFIGURED && window.supabase){ try{ sb=window.supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_KEY); }catch(e){ console.error(e); } }

function money(n){ return (Number(n||0)).toLocaleString("fr-MA")+" د.م."; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
function el(id){ return document.getElementById(id); }
function arr(x){ return Array.isArray(x)?x:[]; }

var STATE = { session:null, tab:"products", products:[], orders:[], editing:null, uploading:false, loginErr:"" };

/* ===== DATA ===== */
function loadAll(cb){
  sb.from("products").select("*").order("created_at",{ascending:false}).then(function(r1){
    STATE.products = (r1.data||[]);
    sb.from("orders").select("*").order("created_at",{ascending:false}).then(function(r2){
      STATE.orders = (r2.data||[]); cb&&cb();
    });
  });
}
function uploadImage(file, cb, err){
  var ext=(file.name.split(".").pop()||"jpg").toLowerCase();
  var path=Date.now()+"-"+Math.random().toString(36).slice(2,8)+"."+ext;
  sb.storage.from("product-images").upload(path,file,{cacheControl:"3600",upsert:false}).then(function(res){
    if(res.error){ err(res.error); return; }
    cb(sb.storage.from("product-images").getPublicUrl(path).data.publicUrl);
  });
}

/* ===== RENDER ===== */
function renderSetup(){
  el("app").innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="max-width:470px;background:#fff;border:1px solid #E1E8F3;border-radius:20px;padding:30px;text-align:center;box-shadow:0 16px 40px rgba(14,27,51,.08)"><div style="font-size:46px">⚙️</div><h1 style="font-size:21px;font-weight:900;margin:12px 0 8px">لوحة التحكم مازال غير مربوطة</h1><p style="color:#33415C;line-height:1.9;font-size:15px;margin:0">عمّر مفاتيح <b>Supabase</b> ف الملف <b>config.js</b>.</p></div></div>';
}
function renderLogin(){
  el("app").innerHTML =
    '<header class="grad" style="color:#fff;padding:14px 18px"><div class="wrap" style="font-size:20px;font-weight:900">'+esc(BRAND)+' · لوحة التحكم</div></header>'+
    '<div style="max-width:400px;margin:0 auto;padding:64px 18px"><div style="background:#fff;border:1px solid #E1E8F3;border-radius:20px;padding:28px;box-shadow:0 16px 40px rgba(14,27,51,.08)">'+
    '<h1 style="font-size:22px;font-weight:900;margin:0 0 18px">دخول</h1>'+
    '<label class="lab">البريد الإلكتروني</label><input id="l_email" class="fld" style="direction:ltr;margin-bottom:14px">'+
    '<label class="lab">كلمة السر</label><input id="l_pwd" class="fld" type="password" onkeydown="if(event.key===\'Enter\')App.login()">'+
    (STATE.loginErr?'<p style="color:#E23D3D;font-size:13px;margin-top:6px">'+STATE.loginErr+'</p>':'')+
    '<button class="btn grad" onclick="App.login()" style="width:100%;margin-top:16px;color:#fff;border:none;border-radius:12px;padding:12px;font-weight:800;font-size:15px">دخول</button>'+
    '</div></div>';
}
function shell(content, newCount){
  return '<header class="grad" style="color:#fff;position:sticky;top:0;z-index:30;box-shadow:0 4px 16px rgba(37,99,235,.25)">'+
    '<div class="wrap" style="display:flex;align-items:center;justify-content:space-between;padding-top:13px;padding-bottom:13px">'+
      '<span style="font-size:20px;font-weight:900">'+esc(BRAND)+' <span style="opacity:.8;font-size:13px;font-weight:700">· لوحة التحكم</span></span>'+
      '<button class="btn" onclick="App.logout()" style="background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:10px;padding:8px 14px;font-weight:700">خروج</button>'+
    '</div>'+
    '<div class="wrap" style="display:flex;gap:4px">'+
      '<button class="btn" onclick="App.setTab(\'products\')" style="background:none;border:none;color:#fff;font-weight:800;font-size:14.5px;padding:11px 14px;border-bottom:'+(STATE.tab==="products"?"3px solid #fff":"3px solid transparent")+';opacity:'+(STATE.tab==="products"?1:.75)+'">المنتجات</button>'+
      '<button class="btn" onclick="App.setTab(\'orders\')" style="background:none;border:none;color:#fff;font-weight:800;font-size:14.5px;padding:11px 14px;border-bottom:'+(STATE.tab==="orders"?"3px solid #fff":"3px solid transparent")+';opacity:'+(STATE.tab==="orders"?1:.75)+'">الطلبات'+(newCount>0?" ("+newCount+")":"")+'</button>'+
    '</div></header>'+content;
}
function imgRowHTML(list,key){
  var h='<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px">';
  list.forEach(function(src,i){ h+='<div style="position:relative"><img src="'+esc(src)+'" style="width:74px;height:74px;object-fit:cover;border-radius:10px;border:1px solid #E1E8F3"><button onclick="App.removeImg(\''+key+'\','+i+')" style="position:absolute;top:-8px;right:-8px;background:#E23D3D;color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-weight:800">×</button></div>'; });
  h+='<label style="width:74px;height:74px;border:1.5px dashed #E1E8F3;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#78859E;font-size:11px;text-align:center;padding:4px">'+(STATE.uploading?"…":"＋ صور")+'<input type="file" accept="image/*" multiple onchange="App.onFile(this,\''+key+'\')" style="display:none"></label></div>';
  return h;
}
function renderProducts(){
  var ed=STATE.editing;
  var c='<div class="wrap" style="padding-top:22px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h1 style="font-size:22px;font-weight:900;margin:0">إدارة المنتجات</h1>'+
    (ed?'':'<button class="btn grad" onclick="App.addNew()" style="color:#fff;border:none;border-radius:12px;padding:11px 18px;font-weight:800">＋ إضافة منتج</button>')+'</div>';

  if(ed){
    c+='<div style="background:#fff;border:1px solid #E1E8F3;border-radius:18px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(14,27,51,.06)">'+
      '<h2 style="font-weight:900;margin:0 0 16px">'+(ed.id?"تعديل المنتج":"منتج جديد")+'</h2>'+
      '<div class="g2">'+
        '<div><label class="lab">اسم المنتج *</label><input id="ef_name" class="fld" value="'+esc(ed.name)+'"></div>'+
        '<div><label class="lab">وصف قصير</label><input id="ef_tag" class="fld" value="'+esc(ed.tagline)+'" placeholder="مثال: أناقة و راحة"></div>'+
        '<div><label class="lab">الثمن (د.م.) *</label><input id="ef_price" type="number" class="fld" style="direction:ltr" value="'+esc(ed.price)+'"></div>'+
        '<div><label class="lab">الثمن القديم (اختياري)</label><input id="ef_old" type="number" class="fld" style="direction:ltr" value="'+esc(ed.old_price)+'" placeholder="للخصم"></div>'+
      '</div>'+
      '<div style="margin-top:14px"><label class="lab">المميزات (كل ميزة ف سطر)</label><textarea id="ef_benefits" class="fld" rows="4" style="resize:vertical" placeholder="نحاس أصلي 100%&#10;توصيل سريع">'+esc(ed.benefitsText)+'</textarea></div>'+
      '<div style="margin-top:14px"><label class="lab">الوصف المفصّل</label><textarea id="ef_desc" class="fld" rows="4" style="resize:vertical">'+esc(ed.description)+'</textarea></div>'+
      '<div style="margin-top:14px"><label class="lab">صور المنتج (المعرض) — الأولى هي الرئيسية</label>'+imgRowHTML(ed.images,"images")+'</div>'+
      '<div style="margin-top:6px"><label class="lab">صور التفاصيل (تبان ف الأسفل) — اختياري</label>'+imgRowHTML(ed.long_images,"long_images")+'</div>'+
      '<div class="g2" style="margin-top:14px">'+
        '<div><label class="lab">التقييم (0-5)</label><input id="ef_rating" type="number" step="0.1" max="5" class="fld" style="direction:ltr" value="'+esc(ed.rating)+'"></div>'+
        '<div><label class="lab">عدد التقييمات</label><input id="ef_reviews" type="number" class="fld" style="direction:ltr" value="'+esc(ed.reviews)+'"></div>'+
        '<div><label class="lab">عدد المبيعات</label><input id="ef_sold" type="number" class="fld" style="direction:ltr" value="'+esc(ed.sold)+'"></div>'+
      '</div>'+
      '<div style="display:flex;gap:10px;margin-top:18px">'+
        '<button class="btn grad" onclick="App.save()" style="color:#fff;border:none;border-radius:12px;padding:11px 18px;font-weight:800">حفظ</button>'+
        '<button class="btn" onclick="App.cancelEdit()" style="background:#fff;color:#2563EB;border:1.5px solid #E1E8F3;border-radius:12px;padding:11px 18px;font-weight:700">إلغاء</button>'+
      '</div></div>';
  }

  if(STATE.products.length===0 && !ed){
    c+='<div style="background:#fff;border:1.5px dashed #E1E8F3;border-radius:18px;padding:40px;text-align:center;color:#78859E">لا توجد منتجات بعد. أضف أول منتج.</div>';
  } else {
    c+='<div style="display:grid;gap:12px">';
    STATE.products.forEach(function(p){
      c+='<div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E1E8F3;border-radius:14px;padding:12px">'+
        (arr(p.images)[0]?'<img src="'+esc(p.images[0])+'" style="width:60px;height:60px;object-fit:cover;border-radius:10px">':'<div style="width:60px;height:60px;background:#EDF1F8;border-radius:10px"></div>')+
        '<div style="flex:1"><div style="font-weight:800">'+esc(p.name)+'</div><div style="color:#2563EB;font-weight:800;font-size:14px">'+money(p.price)+(p.old_price>p.price?'<span style="color:#78859E;text-decoration:line-through;font-weight:500;margin-right:8px">'+money(p.old_price)+'</span>':'')+'</div></div>'+
        '<button class="btn" onclick="App.edit(\''+p.id+'\')" style="background:#fff;color:#2563EB;border:1.5px solid #E1E8F3;border-radius:12px;padding:10px 16px;font-weight:700">تعديل</button>'+
        '<button class="btn" onclick="App.del(\''+p.id+'\')" style="background:#fff;color:#E23D3D;border:1.5px solid #F0CFCF;border-radius:12px;padding:10px 16px;font-weight:700">حذف</button>'+
      '</div>';
    });
    c+='</div>';
  }
  c+='</div>';
  el("app").innerHTML = shell(c, STATE.orders.filter(function(o){return o.status==="new";}).length);
}
function renderOrders(){
  var c='<div class="wrap" style="padding-top:22px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h1 style="font-size:22px;font-weight:900;margin:0">الطلبات</h1>'+
    '<button class="btn" onclick="App.refresh()" style="background:#fff;color:#2563EB;border:1.5px solid #E1E8F3;border-radius:12px;padding:10px 16px;font-weight:700">↻ تحديث</button></div>';
  if(STATE.orders.length===0){
    c+='<div style="background:#fff;border:1.5px dashed #E1E8F3;border-radius:18px;padding:40px;text-align:center;color:#78859E">لا توجد طلبات بعد.</div>';
  } else {
    c+='<div style="display:grid;gap:12px">';
    STATE.orders.forEach(function(o){
      var items=arr(o.items).map(function(it){ return '<div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0"><span>'+esc(it.name)+' <span style="color:#78859E">× '+it.qty+'</span></span><span style="font-weight:700">'+money(it.price*it.qty)+'</span></div>'; }).join("");
      c+='<div style="background:#fff;border:1px solid '+(o.status==="new"?"#2563EB":"#E1E8F3")+';border-radius:16px;padding:16px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">'+
          '<div style="display:flex;align-items:center;gap:8px"><span style="font-weight:900">#'+String(o.id).slice(-6).toUpperCase()+'</span>'+
          (o.status==="new"?'<span style="background:#2563EB;color:#fff;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px">جديد</span>':'')+
          '<span style="color:#78859E;font-size:12px">'+new Date(o.created_at).toLocaleString("ar-MA")+'</span></div>'+
          '<span style="font-weight:900;color:#2563EB;font-size:18px">'+money(o.total)+'</span>'+
        '</div>'+
        '<div class="g2" style="font-size:14px;margin-bottom:12px">'+
          '<div><span style="color:#78859E">الزبون: </span><b>'+esc(o.name)+'</b></div>'+
          '<div style="direction:ltr;text-align:right"><span style="color:#78859E">الهاتف: </span><b>'+esc(o.phone)+'</b></div>'+
          '<div><span style="color:#78859E">المدينة: </span><b>'+esc(o.city)+'</b></div>'+
          '<div><span style="color:#78859E">العنوان: </span><b>'+esc(o.address)+'</b></div>'+
        '</div>'+
        '<div style="border-top:1px solid #EDF1F8;padding-top:10px">'+items+'</div>'+
        '<div style="margin-top:12px">'+(o.status==="new"?'<button class="btn" onclick="App.markHandled(\''+o.id+'\')" style="background:#0EA5A0;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-weight:800;font-size:13px">وضع كمُعالَج</button>':'<span style="color:#0EA5A0;font-weight:800;font-size:14px">مُعالَج ✓</span>')+'</div>'+
      '</div>';
    });
    c+='</div>';
  }
  c+='</div>';
  el("app").innerHTML = shell(c, STATE.orders.filter(function(o){return o.status==="new";}).length);
}
function renderMain(){ if(STATE.tab==="products") renderProducts(); else renderOrders(); }

/* ===== CONTROLLER ===== */
var App = {
  login:function(){
    STATE.loginErr="";
    var email=(el("l_email").value||"").trim(), pwd=el("l_pwd").value||"";
    sb.auth.signInWithPassword({email:email,password:pwd}).then(function(res){
      if(res.error){ STATE.loginErr="البريد أو كلمة السر غير صحيحة"; renderLogin(); }
    });
  },
  logout:function(){ sb.auth.signOut(); },
  setTab:function(t){ STATE.tab=t; STATE.editing=null; renderMain(); },
  refresh:function(){ loadAll(function(){ renderMain(); }); },
  addNew:function(){ STATE.editing={id:null,name:"",tagline:"",price:"",old_price:"",description:"",images:[],long_images:[],benefitsText:"",rating:"5",reviews:"0",sold:"0"}; renderProducts(); },
  edit:function(id){ var p=STATE.products.find(function(x){return x.id===id;}); STATE.editing={id:p.id,name:p.name||"",tagline:p.tagline||"",price:p.price||"",old_price:p.old_price||"",description:p.description||"",images:arr(p.images),long_images:arr(p.long_images),benefitsText:arr(p.benefits).join("\n"),rating:p.rating||"5",reviews:p.reviews||"0",sold:p.sold||"0"}; renderProducts(); window.scrollTo(0,0); },
  cancelEdit:function(){ STATE.editing=null; renderProducts(); },
  capture:function(){ var e=STATE.editing; if(!e) return; if(el("ef_name"))e.name=el("ef_name").value; if(el("ef_tag"))e.tagline=el("ef_tag").value; if(el("ef_price"))e.price=el("ef_price").value; if(el("ef_old"))e.old_price=el("ef_old").value; if(el("ef_benefits"))e.benefitsText=el("ef_benefits").value; if(el("ef_desc"))e.description=el("ef_desc").value; if(el("ef_rating"))e.rating=el("ef_rating").value; if(el("ef_reviews"))e.reviews=el("ef_reviews").value; if(el("ef_sold"))e.sold=el("ef_sold").value; },
  onFile:function(input,key){
    var files=Array.prototype.slice.call(input.files||[]); if(!files.length) return;
    this.capture(); STATE.uploading=true; renderProducts();
    var pending=files.length, self=this;
    files.forEach(function(f){
      uploadImage(f,function(url){ STATE.editing[key]=STATE.editing[key].concat([url]); pending--; if(pending===0){ STATE.uploading=false; renderProducts(); } },
        function(err){ alert("خطأ ف الرفع: "+err.message); pending--; if(pending===0){ STATE.uploading=false; renderProducts(); } });
    });
  },
  removeImg:function(key,i){ this.capture(); STATE.editing[key]=STATE.editing[key].filter(function(_,idx){return idx!==i;}); renderProducts(); },
  save:function(){
    this.capture(); var e=STATE.editing;
    var body={ name:(e.name||"").trim(), tagline:(e.tagline||"").trim(), price:Number(e.price)||0, old_price:Number(e.old_price)||0,
      description:(e.description||"").trim(), images:e.images, long_images:e.long_images,
      benefits:(e.benefitsText||"").split("\n").map(function(s){return s.trim();}).filter(Boolean),
      rating:Number(e.rating)||5, reviews:Number(e.reviews)||0, sold:Number(e.sold)||0 };
    if(!body.name){ alert("خاص اسم المنتج"); return; }
    var q = e.id ? sb.from("products").update(body).eq("id",e.id) : sb.from("products").insert(body);
    q.then(function(res){ if(res.error){ alert("خطأ: "+res.error.message); return; } STATE.editing=null; loadAll(function(){ renderProducts(); }); });
  },
  del:function(id){ if(!confirm("حذف هذا المنتج؟")) return; sb.from("products").delete().eq("id",id).then(function(res){ if(res.error){alert(res.error.message);return;} loadAll(function(){ renderProducts(); }); }); },
  markHandled:function(id){ sb.from("orders").update({status:"handled"}).eq("id",id).then(function(res){ if(res.error){alert(res.error.message);return;} loadAll(function(){ renderOrders(); }); }); }
};
window.App = App;

/* ===== START ===== */
if(!CONFIGURED || !sb){ renderSetup(); }
else {
  sb.auth.getSession().then(function(res){
    STATE.session = res.data.session;
    if(STATE.session){ loadAll(function(){ renderMain(); }); } else { renderLogin(); }
  });
  sb.auth.onAuthStateChange(function(_e,session){
    STATE.session=session;
    if(session){ loadAll(function(){ renderMain(); }); } else { renderLogin(); }
  });
}
</script>
</body>
</html>
